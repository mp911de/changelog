name: Release it 💫

on:
  workflow_dispatch:
    inputs:
      increment:
        description: Version increment
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: Dry run (no commit, tag, or release)
        type: boolean
        default: false

permissions:
  contents: write # push the release commit + tag, create the GitHub release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags: release-it resolves the previous tag, and your changelog tool scans the range
          token: ${{ secrets.DEPLOY_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - run: npm ci
      - run: npm test

      - name: release-it
        run: npx release-it ${{ inputs.increment }} --ci --git.push --no-npm.publish ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }} # release-it uses this for the GitHub release
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }} # your changelog tool (releaseNotes hook) uses this
