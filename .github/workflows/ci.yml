name: CI

env:
  NPM_VERSION: "11.17.0"

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        node: ["24", "26"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install npm with install-script policy support
        run: npm install --global "npm@$NPM_VERSION"

      - run: npm ci
      - run: npm run prettier:check
      - run: npm run typecheck
      - name: Test
        run: >
          npm test --
          --reporter=default
          --reporter=github-actions
          --reporter=junit
          --outputFile.junit=test-results.xml

      - name: Test summary
        if: ${{ !cancelled() && hashFiles('test-results.xml') != '' }}
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: test-results.xml
          show: fail
      - run: npm run build

      - name: Smoke-test packaged CLI
        if: matrix.node == '24'
        run: |
          node dist/cli.js --help
          npm pack --dry-run
