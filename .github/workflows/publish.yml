name: Publish

env:
  NPM_VERSION: "11.17.0"

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build release package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install npm with install-script policy support
        run: npm install --global "npm@$NPM_VERSION"

      - name: Verify tag matches package version
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - name: Test
        run: >
          npm test --
          --reporter=default
          --reporter=github-actions
          --reporter=junit
          --outputFile.junit=test-results.xml

      - name: Test summary
        if: ${{ !cancelled() && hashFiles('test-results.xml') != '' }}
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: test-results.xml
          show: fail
      - run: npm run build

      - name: Pack without running lifecycle scripts again
        run: npm pack --ignore-scripts

      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npmjs
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: npmjs
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm with install-script policy support
        run: npm install --global "npm@$NPM_VERSION"

      - uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: package

      - name: Show package artifact
        run: ls -la package

      - name: Publish the verified package with trusted publishing
        run: npm publish ./package/*.tgz --ignore-scripts --access public --tag latest
